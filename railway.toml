# Root Directory empty → repo /Dockerfile (monorepo).
# Root Directory /backend → backend/Dockerfile (clones repo for frontend build).

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

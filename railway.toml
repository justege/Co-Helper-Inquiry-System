# IMPORTANT: In Railway → Service → Settings, set Root Directory to empty (repo root).
# If Root Directory is /backend, the build will fail with "Missing script: install:all"
# because only backend/package.json is available — the monorepo scripts live at the root.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

# Railway → Service → Settings → Source → Root Directory: leave EMPTY.
# If set to /backend, Docker cannot see backend/ + frontend/ and the build fails.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

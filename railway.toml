# Root Directory on Railway MUST be /backend for this config.
# Uses backend/Dockerfile which clones the repo to build the frontend.

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
